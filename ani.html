<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OB1E 글리치 애니메이션</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    .logo-container {
      position: relative;
      font-size: 8rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      color: #fff;
      text-transform: uppercase;
      animation: logoGlitch 8s ease-in-out infinite;
    }

    .logo {
      position: relative;
      z-index: 2;
    }

    .one {
      color: #ff4500;
      display: inline-block;
      position: relative;
      animation: oneToSlash 8s ease-in-out infinite;
    }

    .glitch-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      color: #fff;
      opacity: 0;
      z-index: 1;
    }

    .glitch-1 {
      animation: glitch1 8s ease-in-out infinite;
      color: #ff0080;
      transform: translateX(-2px);
    }

    .glitch-2 {
      animation: glitch2 8s ease-in-out infinite;
      color: #00ff80;
      transform: translateX(2px);
    }

    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(transparent 50%, rgba(0, 255, 0, 0.03) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      animation: scanlines 0.1s linear infinite;
    }

    .noise {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KICA8ZGVmcz4KICAgIDxmaWx0ZXIgaWQ9Im5vaXNlIiB4PSIwJSIgeT0iMCUiIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPgogICAgICA8ZmVUdXJidWxlbmNlIGJhc2VGcmVxdWVuY3k9IjAuOSIgbnVtT2N0YXZlcz0iNCIgcmVzdWx0PSJub2lzZSIvPgogICAgICA8ZmVDb2xvck1hdHJpeCBpbj0ibm9pc2UiIHR5cGU9InNhdHVyYXRlIiB2YWx1ZXM9IjAiLz4KICAgIDwvZmlsdGVyPgogIDwvZGVmcz4KICA8cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjbm9pc2UpIiBvcGFjaXR5PSIwLjAyIi8+Cjwvc3ZnPg==');
      opacity: 0;
      animation: noise 8s ease-in-out infinite;
    }

    .one::before {
      content: "1";
      animation: contentChange 8s ease-in-out infinite;
    }

    @keyframes contentChange {
      0%, 25% { content: "1"; }
      45%, 100% { content: "/"; }
    }

    @keyframes oneToSlash {
      0%, 25%, 40%, 85%, 100% {
        transform: rotate(0deg) scale(1);
        filter: hue-rotate(0deg) blur(0px) saturate(1) brightness(1);
      }
      30% {
        transform: rotate(4deg) scale(1.03);
        filter: hue-rotate(30deg) blur(1px) saturate(1.2) brightness(1.1);
      }
      30.2% {
        transform: rotate(-6deg) scale(0.94);
        filter: hue-rotate(-40deg) blur(2px) saturate(0.8) brightness(0.9);
      }
      32% {
        transform: rotate(5deg) scale(1.04);
        filter: hue-rotate(35deg) blur(1px) saturate(1.3) brightness(1.15);
      }
      32.2% {
        transform: rotate(-4deg) scale(0.96);
        filter: hue-rotate(-25deg) blur(1px) saturate(0.85) brightness(0.95);
      }
      35% {
        transform: rotate(3deg) scale(1.02);
        filter: hue-rotate(20deg) blur(1px) saturate(1.1) brightness(1.05);
      }
      35.2% {
        transform: rotate(-5deg) scale(0.97);
        filter: hue-rotate(-30deg) blur(1px) saturate(0.9) brightness(0.98);
      }
      38% {
        transform: rotate(2deg) scale(1.01);
        filter: hue-rotate(15deg) blur(0px) saturate(1.05) brightness(1.02);
      }
      87% {
        transform: rotate(-2deg) scale(1.01);
        filter: hue-rotate(-15deg) blur(0px) saturate(1.1) brightness(1.03);
      }
      89% {
        transform: rotate(3deg) scale(0.98);
        filter: hue-rotate(20deg) blur(1px) saturate(0.9) brightness(0.97);
      }
      91% {
        transform: rotate(-1deg) scale(1.005);
        filter: hue-rotate(-8deg) blur(0px) saturate(1.02) brightness(1.01);
      }
    }

    @keyframes glitch1 {
      30%, 30.3%, 32%, 32.3%, 35%, 35.3%, 38%, 38.3% {
        opacity: 0.7;
        transform: translateX(-4px) skew(-3deg);
      }
      30.15%, 32.15%, 35.15%, 38.15% {
        opacity: 0.5;
        transform: translateX(-5px) skew(-4deg) scaleY(1.05);
      }
    }

    @keyframes glitch2 {
      31%, 31.3%, 34%, 34.3%, 36%, 36.3%, 39%, 39.3% {
        opacity: 0.6;
        transform: translateX(4px) skew(3deg);
      }
      31.15%, 34.15%, 36.15%, 39.15% {
        opacity: 0.4;
        transform: translateX(5px) skew(4deg) scaleY(1.05);
      }
    }

    @keyframes scanlines {
      0% { transform: translateY(0); }
      100% { transform: translateY(4px); }
    }

    @keyframes noise {
      30%, 30.3%, 32%, 32.3%, 35%, 35.3%, 38%, 38.3% {
        opacity: 0.06;
      }
    }

    @keyframes logoGlitch {
      30%, 32%, 35%, 38% {
        transform: translateX(1px);
        filter: saturate(1.2) brightness(1.1) contrast(1.05);
      }
      30.15%, 32.15%, 35.15%, 38.15% {
        transform: translateX(-1px);
        filter: saturate(0.9) brightness(0.95) contrast(1.1);
      }
    }

    .freeze, .freeze * {
      animation: none !important;
    }

    .tagline {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffffcc;
      font-size: 1rem;
      margin-top: 0.5rem;
      white-space: nowrap;
      font-weight: 300;
      letter-spacing: 0.1em;
    }

    @media (max-width: 768px) {
      .logo-container {
        font-size: 4rem;
      }

      .tagline {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="logo-container" onclick="restartAnimation()">
    <div class="logo">
      OB<span class="one"></span>E
    </div>
    <div class="glitch-layer glitch-1">
      OB<span class="one"></span>E
    </div>
    <div class="glitch-layer glitch-2">
      OB<span class="one"></span>E
    </div>
    <div class="scanlines"></div>
    <div class="noise"></div>
    <div class="tagline">Off by One Error</div>
  </div>

  <script>
    function stopAtSlash() {
      const container = document.querySelector('.logo-container');
      container.classList.add('freeze');
    }

    function restartAnimation() {
      const container = document.querySelector('.logo-container');
      container.classList.remove('freeze');
      container.offsetHeight;

      const elements = document.querySelectorAll('.one, .glitch-1, .glitch-2, .scanlines, .noise');
      elements.forEach(el => {
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = null;
      });

      setTimeout(stopAtSlash, 5000); // 타이밍 조정 가능
    }

    window.addEventListener('load', () => {
      setTimeout(stopAtSlash, 5000);
    });

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        restartAnimation();
      }
    });
  </script>
</body>
</html>
