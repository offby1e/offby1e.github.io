<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OB1E 글리치 애니메이션</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      color: white;
    }

    .logo-container {
      position: relative;
      font-size: 8rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
    }

    .logo {
      position: relative;
      z-index: 2;
    }

    .one {
      color: #ff4500;
      display: inline-block;
      position: relative;
    }

    .one.animate {
      animation: glitchChange 0.6s ease-in-out;
    }

    @keyframes glitchChange {
      0% {
        transform: scale(1) rotate(0deg);
        filter: hue-rotate(0deg) blur(0px);
      }
      30% {
        transform: scale(1.3) rotate(10deg);
        filter: hue-rotate(40deg) blur(1px);
      }
      60% {
        transform: scale(0.9) rotate(-8deg);
        filter: hue-rotate(-30deg) blur(2px);
      }
      100% {
        transform: scale(1) rotate(0deg);
        filter: hue-rotate(0deg) blur(0px);
      }
    }

    .tagline {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffffcc;
      font-size: 1rem;
      margin-top: 0.5rem;
      white-space: nowrap;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-shadow: 0 0 4px rgba(255, 255, 255, 0.2); /* 약한 글로우 */
    }

    @media (max-width: 768px) {
      .logo-container {
        font-size: 4rem;
      }

      .tagline {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="logo">
      OB<span class="one">1</span>E
    </div>
    <div class="tagline">Off by One Error</div>
  </div>

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const one = document.querySelector('.one');
        one.textContent = '/';
        one.classList.add('animate');

        one.addEventListener('animationend', () => {
          one.classList.remove('animate');
        }, { once: true });
      }, 5000);
    });
  </script>
</body>
</html>
